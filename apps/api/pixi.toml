[workspace]
name = "location-platform-api"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
python = "3.13.*"
fastapi = ">=0.136.1,<0.137"
uvicorn = ">=0.47.0,<0.48"
sqlalchemy = ">=2.0.49,<3"
numpy = ">=2.4.5,<3"
s2sphere = ">=0.2.5,<0.3"
psycopg = "*"
python-jose = ">=3.5.0,<4"
cryptography = ">=48.0.0,<49"
passlib = ">=1.7.4,<2"
bcrypt = ">=5.0.0,<6"
python-multipart = ">=0.0.28,<0.0.29"
pyjwt = ">=2.12.1,<3"
httpx = ">=0.28.1,<0.29"
pandas = ">=3.0.3,<4"
pydantic = ">=2.13.4,<3"
pyarrow = ">=24.0.0,<25"
scikit-learn = ">=1.8.0,<2"
geopandas = ">=1.1.3,<2"
shapely = ">=2.1.2,<3"
pyogrio = ">=0.12.1,<0.13"
python-dotenv = ">=1.2.2,<2"
scipy = ">=1.17.1,<2"

[tasks]
api = "uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
